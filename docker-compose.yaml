name: llama-cpp-casaos

services:
  llama-server:
    image: ghcr.io/edsonperes/llama-cpp-casaos:latest
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /DATA/AppData/llama-cpp/models:/root/.cache/llama.cpp
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LLAMA_ARG_N_PARALLEL=1
      - LLAMA_ARG_THREADS=4
      - LLAMA_ARG_CACHE_PROMPT=1
      - LLAMA_ARG_CACHE_REUSE=256
      - LLAMA_OFFLINE=1
      - LLAMA_API_KEY=sk-llama-t110-S3cur3P4ss!
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

x-casaos:
  architectures:
    - amd64
  main: llama-server
  description:
    en_us: >-
      llama.cpp inference server with NVIDIA CUDA GPU acceleration and built-in
      chat WebUI. Multi-model router with Gemma 4 E2B and Qwen 3.5 2B.
      Switch models directly from the WebUI. Optimized for NVIDIA Tesla P4
      (8GB VRAM). Models are downloaded automatically on first use.
    pt_br: >-
      Servidor de inferencia llama.cpp com aceleracao GPU NVIDIA CUDA e WebUI
      de chat integrada. Router multi-modelo com Gemma 4 E2B e Qwen 3.5 2B.
      Troque de modelo direto pela WebUI. Otimizado para NVIDIA Tesla P4
      (8GB VRAM). Modelos baixados automaticamente no primeiro uso.
  tagline:
    en_us: Multi-model LLM server with NVIDIA GPU
    pt_br: Servidor LLM multi-modelo com GPU NVIDIA
  developer: ggml-org
  author: edsonperes
  icon: https://avatars.githubusercontent.com/u/132372032?s=200&v=4
  title:
    en_us: llama.cpp Multi-Model (CUDA)
    pt_br: llama.cpp Multi-Modelo (CUDA)
  category: Ai
  tips:
    before_install:
      en_us: >-
        Requirements: NVIDIA GPU drivers and nvidia-container-toolkit.
        Includes Gemma 4 E2B and Qwen 3.5 2B models. Gemma loads on startup,
        Qwen loads on demand from the WebUI model selector. Only one model
        runs at a time (8GB VRAM limit). Models download on first use.
      pt_br: >-
        Requisitos: drivers NVIDIA e nvidia-container-toolkit.
        Inclui modelos Gemma 4 E2B e Qwen 3.5 2B. Gemma carrega na
        inicializacao, Qwen carrega sob demanda pelo seletor de modelos
        na WebUI. Apenas um modelo roda por vez (limite 8GB VRAM).
        Modelos baixam no primeiro uso.
  port_map: "8080"
  scheme: http
  store_app_id: llama-cpp-cuda
