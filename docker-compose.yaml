name: llama-cpp-casaos

services:
  llama-server:
    image: ghcr.io/edsonperes/llama-cpp-casaos:latest
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /DATA/AppData/llama-cpp/models:/root/.cache/llama.cpp
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LLAMA_ARG_HF_REPO=ggml-org/gemma-4-E2B-it-GGUF
      - LLAMA_ARG_HF_FILE=gemma-4-E2B-it-Q8_0.gguf
      - LLAMA_ARG_N_GPU_LAYERS=999
      - LLAMA_ARG_CTX_SIZE=2048
      - LLAMA_ARG_FLASH_ATTN=1
      - LLAMA_ARG_THREADS=4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

x-casaos:
  architectures:
    - amd64
  main: llama-server
  description:
    en_us: >-
      llama.cpp inference server with NVIDIA CUDA GPU acceleration and built-in
      chat WebUI. Runs Google Gemma 4 E2B (Q8_0) with full GPU offload.
      Optimized for NVIDIA Tesla P4 (8GB VRAM). The model is downloaded
      automatically on first start (~4.97GB).
    pt_br: >-
      Servidor de inferencia llama.cpp com aceleracao GPU NVIDIA CUDA e WebUI
      de chat integrada. Roda Google Gemma 4 E2B (Q8_0) com offload total
      na GPU. Otimizado para NVIDIA Tesla P4 (8GB VRAM). O modelo e baixado
      automaticamente na primeira execucao (~4.97GB).
  tagline:
    en_us: Gemma 4 E2B LLM server with NVIDIA GPU
    pt_br: Servidor LLM Gemma 4 E2B com GPU NVIDIA
  developer: ggml-org
  author: edsonperes
  icon: https://avatars.githubusercontent.com/u/132372032?s=200&v=4
  title:
    en_us: llama.cpp Gemma 4 (CUDA)
    pt_br: llama.cpp Gemma 4 (CUDA)
  category: Ai
  tips:
    before_install:
      en_us: >-
        Requirements: NVIDIA GPU drivers and nvidia-container-toolkit must be
        installed on the host. The Gemma 4 E2B model (~4.97GB) will be
        downloaded automatically on first start. First boot may take several
        minutes depending on your internet speed.
      pt_br: >-
        Requisitos: drivers NVIDIA e nvidia-container-toolkit instalados no
        host. O modelo Gemma 4 E2B (~4.97GB) sera baixado automaticamente
        na primeira execucao. A primeira inicializacao pode demorar alguns
        minutos dependendo da velocidade da internet.
  port_map: "8080"
  scheme: http
  store_app_id: llama-cpp-cuda
