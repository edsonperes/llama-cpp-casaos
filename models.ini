version = 1

; Configuracoes globais compartilhadas entre todos os modelos
[*]
n-gpu-layers = 999
ctx-size = 32768
flash-attn = true
cache-type-k = q4_0
cache-type-v = q4_0
n-parallel = 1

; Google Gemma 4 E2B - modelo principal
[ggml-org/gemma-4-E2B-it-GGUF:Q8_0]
alias = gemma-4-e2b
load-on-startup = true

; Qwen 3.5 2B - modelo secundario
[unsloth/Qwen3.5-2B-GGUF:Q8_0]
alias = qwen3.5-2b
load-on-startup = false
